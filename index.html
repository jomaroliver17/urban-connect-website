<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Connect TT | Trinidad & Tobago's Trusted Phone Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #0A1224; --primary-blue: #0E1F3D; --accent-cyan: #0EDFEF; --accent-green: #25D366; --text-gray: #A0B0C4; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #FFF; color: #333; }
        
        /* Layout Helpers */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Header/Nav */
        .top-nav { background: var(--primary-dark); color: #FFF; padding: 10px 0; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .main-nav { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EEE; }
        
        /* Hero */
        .hero { background: linear-gradient(rgba(10, 18, 36, 0.9), rgba(10, 18, 36, 0.9)), url('https://via.placeholder.com/1500x600'); padding: 100px 20px; text-align: center; color: #FFF; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn { padding: 12px 25px; border-radius: 5px; text-decoration: none; font-weight: 700; }
        .btn-blue { background: #007bff; color: #FFF; }
        .btn-outline { border: 2px solid #FFF; color: #FFF; }
        .btn-white { background: #FFF; color: #333; }

        /* Product Grid */
        .section-title { text-align: center; margin: 50px 0; font-size: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #EEE; padding: 20px; text-align: center; border-radius: 10px; }
        .card img { width: 100%; height: 200px; object-fit: contain; }
        .price { color: #007bff; font-weight: 900; font-size: 1.2rem; }
        .badge { display: inline-block; padding: 5px 10px; background: #000; color: #FFF; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="top-nav container">
        <span>59 Eastern Main Road, Tunapuna | (868) 330-8360</span>
        <span>Mon - Fri 9AM - 5PM</span>
    </div>
    
    <nav class="main-nav container">
        <div style="font-weight:900; font-size:1.5rem;">URBAN CONNECT TT</div>
        <div>HOME | SHOP PHONES | REPAIRS | CONTACT</div>
    </nav>

    <section class="hero">
        <h1>TRINIDAD & TOBAGO'S TRUSTED PHONE STORE</h1>
        <div class="btn-group">
            <a href="#" class="btn btn-blue">SHOP PHONES</a>
            <a href="#" class="btn btn-outline">BOOK A REPAIR</a>
            <a href="#" class="btn btn-white">WHATSAPP US</a>
        </div>
    </section>

    <div class="container">
        <h2 class="section-title">SHOP OUR LATEST PHONES</h2>
        <div class="grid">
            <!-- Product Example -->
            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Phone">
                <h3>iPhone 15 Pro Max</h3>
                <p>256GB • Natural Titanium</p>
                <div class="price">TT$6,999</div>
                <div class="badge">BRAND NEW</div>
            </div>
            <!-- Repeat for other phones -->
        </div>
    </div>
</body>
</html>
