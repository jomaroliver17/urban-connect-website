<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Connect TT | Trinidad & Tobago's Trusted Phone Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0A1224;
            --primary-blue: #0E1F3D;
            --accent-cyan: #0EDFEF;
            --accent-green: #25D366;
            --text-light: #FFFFFF;
            --text-gray: #A0B0C4;
            --border-color-dark: #1C3358;
            --border-color-light: #E0E0E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; letter-spacing: -0.2px; }

        body { background-color: var(--primary-dark); color: var(--text-light); line-height: 1.5; }

        h1, h2, h3, .nav-links a { font-weight: 800; }

        .top-bar { background-color: var(--primary-dark); padding: 10px 60px; font-size: 0.8rem; border-bottom: 1px solid var(--border-color-dark); display: flex; justify-content: space-between; }
        .top-info span { margin-right: 25px; display: inline-flex; align-items: center; gap: 8px; }
        .top-info i { color: var(--accent-cyan); }

        .navbar { background-color: #FFFFFF; color: #333; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 900; color: #0A1426; font-size: 2.2rem; }
        .logo-text span { color: var(--accent-cyan); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 700; font-size: 0.9rem; }
        .nav-icons { display: flex; align-items: center; gap: 25px; cursor: pointer; }

        .hero { background: linear-gradient(rgba(10, 18, 36, 0.92), rgba(10, 18, 36, 0.98)), url('https://via.placeholder.com/1500x800') center/cover; text-align: center; padding: 120px 20px; }
        .hero-title { font-size: 5.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .hero-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn { padding: 18px 40px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: all 0.3s; }
        .btn-primary { background-color: var(--accent-cyan); color: #0A1426; }
        .btn-whatsapp { background-color: var(--accent-green); color: #FFF; }

        .features-banner { background-color: var(--primary-blue); display: flex; justify-content: space-around; padding: 40px 60px; }
        .feature-item { display: flex; align-items: center; gap: 20px; }
        .feature-item i { font-size: 2.2rem; color: var(--accent-cyan); }

        .floating-whatsapp { position: fixed; bottom: 30px; right: 30px; background-color: var(--accent-green); color: #FFF; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; z-index: 1100; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-info">
            <span><i class="fa-solid fa-location-dot"></i> 59 Eastern Main Road, Tunapuna</span>
            <span><i class="fa-solid fa-phone"></i> (868) 330-8360</span>
        </div>
    </div>

    <nav class="navbar">
        <h1 class="logo-text">URBAN<span>CONNECT</span>TT</h1>
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">SHOP PHONES</a></li>
            <li><a href="#">REPAIRS</a></li>
        </ul>
        <div class="nav-icons"><i class="fa-solid fa-cart-shopping"></i></div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">URBAN CONNECT TT</h1>
        <p>Premium Phones. Expert Repairs. Unbeatable Prices.</p>
        <div class="hero-buttons">
            <a href="#" class="btn btn-primary">SHOP PHONES</a>
            <a href="https://wa.me/18683308360" class="btn btn-whatsapp" target="_blank">WHATSAPP US</a>
        </div>
    </section>

    <div class="features-banner">
        <div class="feature-item">
            <i class="fa-solid fa-shield-halved"></i>
            <div><strong>90-DAY WARRANTY</strong><p>Shop with confidence</p></div>
        </div>
    </div>

    <a href="https://wa.me/18683308360" class="floating-whatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

</body>
</html>
